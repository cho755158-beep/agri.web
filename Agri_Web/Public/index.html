<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Web Portal</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        html,body {width: 100%; height: 100%;overflow: hidden; margin: 0; padding: 0;}
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; padding: 6px; height: 100vh;}
        /* Ẩn màn hình chính lúc mới vào */
        #login-screen {
            display: flex;
            padding: 0px 0px 20px 0px;
        }

        #main-screen {
            display: none;
            padding: 0px 0px 20px 0px;
        }
        #web-viewer {
            flex: 1 1 auto;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }
        #web-frame {
            flex: 1;
            border: none;
        }
        button { padding: 10px 16px; border: 1px solid #ccc; border-radius: 8px; background: white; cursor: pointer; font-size: 14px;}
        button:hover { background: #f0f0f0; }
        .file-input-group { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <button id="btn-google-login">Đăng nhập với Google</button>
        <p id="login-status"></p>
    </div>

    <div id="main-screen">
        <div>
            <label for="screen-type">Bảng tính: </label>
            <select id="screen-type">
                <option value="accruedExpense">Dự chi</option>
                <option value="accruedIncome">Dự thu</option>
            </select>
        </div>

        <div class="file-input-group">
            <input type="file" id="file-local-1" accept=".csv" />
            <input type="file" id="file-local-2" accept=".csv" />
            <button id="btn-upload">Tải lên</button>
        </div>
    </div>
    <div id="web-viewer">
        <iframe id="web-frame" width="100%" height="100%" style="border:none;">
    </iframe>
    </div>

    <script src="app.js"></script>
</body>
</html>
